name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  harness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm test
      - run: node scripts/harness.mjs check --profile source-package .
      - run: node scripts/harness.mjs check --profile target-project examples/minimal-project
      - run: node scripts/harness.mjs dashboard --out tmp/example-dashboard.html examples/minimal-project
