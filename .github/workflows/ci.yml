name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  root:
    name: Root package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install root dependencies
        run: npm install

      - name: Build generated runtime
        run: npm run build:runtime

      - name: Check committed whitespace
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}"...HEAD

      - name: Check committed whitespace
        if: github.event_name != 'pull_request'
        run: git diff --check HEAD^..HEAD

      - name: Run root typecheck
        run: npm run typecheck

      - name: Run type boundary guards
        run: npm run typecheck:guards

      - name: Run root tests
        run: npm test

      - name: Check source package boundary
        run: npm run check

      - name: Check minimal target project
        run: node dist/harness.mjs check --profile target-project examples/minimal-project

      - name: Generate example dashboard
        run: node dist/harness.mjs dashboard --out tmp/example-dashboard.html examples/minimal-project

      - name: Smoke test dashboard
        run: npm run smoke:dashboard

      - name: Dry-run npm package
        run: npm run pack:dry-run

  windows-package-smoke:
    name: Windows package smoke
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install root dependencies
        run: npm install --no-audit --no-fund

      - name: Build generated runtime
        run: npm run build:runtime

      - name: Run CLI help
        run: node dist/harness.mjs --help

      - name: Dry-run npm package
        run: npm run pack:dry-run

      - name: Install packed package and run CLI
        shell: pwsh
        run: |
          $packDir = Join-Path $env:RUNNER_TEMP "harness-pack"
          $consumer = Join-Path $env:RUNNER_TEMP "harness-consumer"
          New-Item -ItemType Directory -Force -Path $packDir, $consumer | Out-Null
          $tarballName = (npm pack --silent --pack-destination $packDir).Trim().Split("`n")[-1].Trim()
          $tarball = Join-Path $packDir $tarballName
          Set-Content -Path (Join-Path $consumer "package.json") -Value '{"private":true,"type":"module"}'
          npm install --prefix $consumer --no-audit --no-fund $tarball
          & (Join-Path $consumer "node_modules/.bin/harness.cmd") --help

  gui:
    name: GUI submodule
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: harness-gui/package-lock.json

      - name: Install GUI dependencies
        working-directory: harness-gui
        run: npm ci

      - name: Typecheck GUI
        working-directory: harness-gui
        run: npm run typecheck

      - name: Test GUI
        working-directory: harness-gui
        run: npm test

      - name: Build GUI
        working-directory: harness-gui
        run: npm run build

  harness:
    name: harness
    runs-on: ubuntu-latest
    needs:
      - root
      - windows-package-smoke
      - gui
    steps:
      - name: Confirm required checks passed
        run: echo "Root package and GUI submodule checks passed."
